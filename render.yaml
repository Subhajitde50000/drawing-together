services:
  - type: web
    name: drawing-together-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: MAX_PLAYERS_PER_ROOM
        value: "2"
      - key: PYTHON_VERSION
        value: "3.11.0"
